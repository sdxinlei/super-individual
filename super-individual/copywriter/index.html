<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="AI 文案助手 - 输入产品信息，自动生成小红书文案、X/Twitter 推文和朋友圈文案。一键多平台分发，超级个体出品。">
    <meta name="keywords" content="AI文案助手, AI写文案, 小红书文案生成, Twitter推文生成, 社交媒体文案, AI营销工具, 超级个体">

    <!-- Open Graph -->
    <meta property="og:title" content="AI 文案助手 · 超级个体">
    <meta property="og:description" content="输入产品信息，一键生成小红书、Twitter、朋友圈社交媒体推广文案，支持多种风格。">
    <meta property="og:type" content="website">
    <meta property="og:url" content="https://super-individual.com/copywriter/">
    <meta property="og:locale" content="zh_CN">

    <!-- Twitter Card -->
    <meta name="twitter:card" content="summary_large_image">
    <meta name="twitter:title" content="AI 文案助手 · 超级个体">
    <meta name="twitter:description" content="输入产品信息，一键生成小红书、Twitter、朋友圈社交媒体推广文案，支持多种风格。">

    <!-- JSON-LD Structured Data: WebApplication -->
    <script type="application/ld+json">
    {
        "@context": "https://schema.org",
        "@type": "WebApplication",
        "name": "AI 文案助手",
        "url": "https://super-individual.com/copywriter/",
        "description": "输入产品信息，自动生成小红书文案和 X/Twitter 推文。一键多平台分发。",
        "applicationCategory": "MarketingApplication",
        "operatingSystem": "All",
        "offers": {
            "@type": "Offer",
            "price": "0",
            "priceCurrency": "CNY"
        }
    }
    </script>

    <title>AI 文案助手 · 超级个体</title>
    <link rel="stylesheet" href="../css/style.css">
    <style>
        .tool-hero {
            padding: 120px 0 40px;
            text-align: center;
        }
        .tool-hero h1 { font-size: 2rem; margin-bottom: 8px; }
        .tool-hero p { color: #a1a1aa; margin-bottom: 0; }
        .tool-container {
            max-width: 720px;
            margin: 0 auto;
            padding: 0 24px 80px;
        }
        .input-section {
            background: rgba(255,255,255,0.03);
            border: 1px solid rgba(255,255,255,0.08);
            border-radius: 12px;
            padding: 28px;
            margin-bottom: 24px;
        }
        .input-section h3 {
            font-size: 1rem;
            font-weight: 600;
            margin-bottom: 16px;
            color: #e4e4e7;
        }
        .form-group {
            margin-bottom: 16px;
        }
        .form-group label {
            display: block;
            font-size: 0.85rem;
            color: #a1a1aa;
            margin-bottom: 8px;
        }
        .form-group input, .form-group textarea, .form-group select {
            width: 100%;
            background: rgba(0,0,0,0.3);
            border: 1px solid rgba(255,255,255,0.1);
            border-radius: 8px;
            padding: 10px 14px;
            color: #e4e4e7;
            font-size: 0.9rem;
            font-family: inherit;
            transition: border-color 0.2s;
        }
        .form-group textarea {
            min-height: 80px;
            resize: vertical;
            line-height: 1.5;
        }
        .form-group input:focus, .form-group textarea:focus, .form-group select:focus {
            outline: none;
            border-color: #6366f1;
        }
        .form-group select option { background: #1a1a2e; }
        .form-row {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 16px;
        }

        .platform-toggles {
            display: flex;
            gap: 12px;
            flex-wrap: wrap;
        }
        .platform-toggle {
            display: flex;
            align-items: center;
            gap: 6px;
            padding: 8px 16px;
            border-radius: 8px;
            border: 1px solid rgba(255,255,255,0.1);
            background: rgba(255,255,255,0.03);
            cursor: pointer;
            transition: all 0.2s;
            font-size: 0.85rem;
            color: #a1a1aa;
            user-select: none;
        }
        .platform-toggle:hover {
            border-color: rgba(99,102,241,0.3);
        }
        .platform-toggle.active {
            border-color: #6366f1;
            background: rgba(99,102,241,0.1);
            color: #a5b4fc;
        }
        .platform-toggle input { display: none; }

        .tool-actions {
            display: flex;
            gap: 12px;
            justify-content: center;
            margin-bottom: 32px;
        }

        .loading {
            display: none;
            text-align: center;
            padding: 40px;
        }
        .loading.active { display: block; }
        .spinner {
            width: 36px; height: 36px;
            border: 3px solid rgba(99,102,241,0.2);
            border-top-color: #6366f1;
            border-radius: 50%;
            animation: spin 0.8s linear infinite;
            margin: 0 auto 16px;
        }
        @keyframes spin { to { transform: rotate(360deg); } }
        .loading p { color: #a1a1aa; font-size: 0.9rem; }

        .output-section {
            display: none;
        }
        .output-section.active { display: block; }

        .output-card {
            background: rgba(255,255,255,0.03);
            border: 1px solid rgba(255,255,255,0.08);
            border-radius: 12px;
            padding: 24px;
            margin-bottom: 20px;
        }
        .output-card-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 12px;
        }
        .output-card-header h4 {
            font-size: 0.95rem;
            font-weight: 600;
            display: flex;
            align-items: center;
            gap: 8px;
        }
        .output-card-header .platform-badge {
            font-size: 0.75rem;
            padding: 2px 10px;
            border-radius: 12px;
            background: rgba(99,102,241,0.1);
            color: #a5b4fc;
        }
        .output-text {
            font-size: 0.9rem;
            line-height: 1.7;
            color: #d4d4d8;
            white-space: pre-wrap;
            margin-bottom: 12px;
        }
        .copy-btn {
            padding: 4px 12px;
            border-radius: 6px;
            border: 1px solid rgba(255,255,255,0.1);
            background: rgba(255,255,255,0.05);
            color: #a1a1aa;
            font-size: 0.78rem;
            cursor: pointer;
            transition: all 0.2s;
        }
        .copy-btn:hover {
            background: rgba(99,102,241,0.1);
            border-color: rgba(99,102,241,0.3);
            color: #a5b4fc;
        }

        .back-link {
            display: block;
            text-align: center;
            margin-top: 24px;
            color: #71717a;
            font-size: 0.85rem;
        }
        .back-link:hover { color: #a1a1aa; }

        .toast {
            position: fixed;
            bottom: 24px;
            left: 50%;
            transform: translateX(-50%) translateY(100px);
            background: rgba(99,102,241,0.9);
            color: #fff;
            padding: 10px 24px;
            border-radius: 8px;
            font-size: 0.85rem;
            opacity: 0;
            transition: all 0.3s;
            pointer-events: none;
            z-index: 200;
        }
        .toast.show {
            opacity: 1;
            transform: translateX(-50%) translateY(0);
        }

        @media (max-width: 640px) {
            .form-row { grid-template-columns: 1fr; }
            .platform-toggles { flex-direction: column; }
        }
    </style>
</head>
<body>
    <nav class="navbar">
        <div class="container">
            <div class="logo"><a href="../index.html" style="color:inherit">🚀 超级个体</a></div>
            <div class="nav-links">
                <a href="../index.html#works">作品</a>
                <a href="../index.html#contact" class="btn-primary">联系我</a>
            </div>
        </div>
    </nav>

    <div class="tool-hero">
        <div class="container">
            <h1>✍️ AI 文案助手</h1>
            <p>输入产品信息，一键生成社交媒体推广文案</p>
        </div>
    </div>

    <div class="tool-container">
        <!-- API Key 配置 -->
        <div style="background:rgba(255,255,255,0.03);border:1px solid rgba(255,255,255,0.08);border-radius:12px;padding:16px 28px;margin-bottom:16px;display:flex;align-items:center;gap:12px;flex-wrap:wrap;">
            <label for="apiKeyInput" style="font-size:0.85rem;color:#a1a1aa;white-space:nowrap;">🔑 API Key</label>
            <input type="password" id="apiKeyInput" placeholder="输入 Claude API Key（可选，留空则使用本地模板）" style="flex:1;min-width:200px;background:rgba(0,0,0,0.3);border:1px solid rgba(255,255,255,0.1);border-radius:8px;padding:8px 12px;color:#e4e4e7;font-size:0.85rem;font-family:inherit;">
            <button onclick="clearApiKey()" style="padding:6px 14px;border-radius:6px;border:1px solid rgba(255,255,255,0.1);background:rgba(255,255,255,0.05);color:#a1a1aa;font-size:0.78rem;cursor:pointer;transition:all 0.2s;white-space:nowrap;" onmouseover="this.style.borderColor='rgba(239,68,68,0.3)';this.style.color='#f87171'" onmouseout="this.style.borderColor='rgba(255,255,255,0.1)';this.style.color='#a1a1aa'">清除</button>
        </div>

        <div class="input-section">
            <h3>📝 产品信息</h3>
            <div class="form-group">
                <label for="productName">产品/品牌名称</label>
                <input type="text" id="productName" placeholder="例如：超级个体周报生成器">
            </div>
            <div class="form-row">
                <div class="form-group">
                    <label for="productDesc">一句话描述</label>
                    <input type="text" id="productDesc" placeholder="例如：用 AI 一键生成工作周报的工具">
                </div>
                <div class="form-group">
                    <label for="targetAudience">目标受众</label>
                    <input type="text" id="targetAudience" placeholder="例如：职场白领、管理者">
                </div>
            </div>
            <div class="form-group">
                <label for="keyHighlights">核心卖点（每行一个）</label>
                <textarea id="keyHighlights" placeholder="省时：3 秒生成周报&#10;智能：AI 自动润色&#10;免费：完全免费使用"></textarea>
            </div>
            <div class="form-group">
                <label>发布平台</label>
                <div class="platform-toggles">
                    <label class="platform-toggle active" data-platform="xiaohongshu">
                        <input type="checkbox" checked> 📕 小红书
                    </label>
                    <label class="platform-toggle active" data-platform="twitter">
                        <input type="checkbox" checked> 🐦 X/Twitter
                    </label>
                    <label class="platform-toggle" data-platform="wechat">
                        <input type="checkbox"> 💬 朋友圈
                    </label>
                </div>
            </div>
            <div class="form-row">
                <div class="form-group">
                    <label for="tone">文案风格</label>
                    <select id="tone">
                        <option value="casual">轻松口语</option>
                        <option value="professional" selected>专业正式</option>
                        <option value="humorous">幽默风趣</option>
                        <option value="urgent">紧迫感</option>
                    </select>
                </div>
                <div class="form-group">
                    <label for="count">生成条数（每条最多）</label>
                    <select id="count">
                        <option value="2">2 条</option>
                        <option value="3" selected>3 条</option>
                        <option value="5">5 条</option>
                    </select>
                </div>
            </div>
        </div>

        <div class="tool-actions">
            <button class="btn-primary" onclick="generateCopy()">✨ 生成文案</button>
            <button class="btn-secondary" onclick="clearAll()">清空</button>
        </div>

        <div class="loading" id="loading">
            <div class="spinner"></div>
            <p>AI 正在创作文案...</p>
        </div>

        <div class="output-section" id="outputSection"></div>

        <a href="../index.html" class="back-link">← 返回主页</a>
    </div>

    <div class="toast" id="toast"></div>

    <script src="app.js"></script>

</body>
</html>
