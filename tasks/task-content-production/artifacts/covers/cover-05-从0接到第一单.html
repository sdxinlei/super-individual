<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>小红书封面卡 - 效率工具</title>
<style>
/* 深色科技风封面卡 */
* { margin: 0; padding: 0; box-sizing: border-box; }
body { display: flex; justify-content: center; align-items: center; min-height: 100vh; background: #0a0a1a; font-family: -apple-system, 'PingFang SC', 'Microsoft YaHei', sans-serif; }
.card {
  width: 1080px; height: 1080px; background: linear-gradient(135deg, #0a0a1a 0%, #12122a 40%, #1a0a2e 100%);
  position: relative; overflow: hidden; display: flex; flex-direction: column; justify-content: center; align-items: center; padding: 120px;
}
/* 背景装饰光晕 */
.card::before { content: ''; position: absolute; top: -30%; left: -20%; width: 70%; height: 80%; background: radial-gradient(ellipse, rgba(108,92,231,0.12) 0%, transparent 70%); pointer-events: none; }
.card::after { content: ''; position: absolute; bottom: -20%; right: -10%; width: 60%; height: 60%; background: radial-gradient(ellipse, rgba(168,85,247,0.08) 0%, transparent 70%); pointer-events: none; }
/* 装饰网格线 */
.grid { position: absolute; inset: 0; background-image: linear-gradient(rgba(108,92,231,0.03) 1px, transparent 1px), linear-gradient(90deg, rgba(108,92,231,0.03) 1px, transparent 1px); background-size: 60px 60px; pointer-events: none; }
/* 顶部标签 */
.tag { position: absolute; top: 60px; left: 80px; display: flex; align-items: center; gap: 10px; padding: 10px 24px; background: rgba(108,92,231,0.15); border: 1px solid rgba(108,92,231,0.3); border-radius: 100px; color: #a0a0ff; font-size: 28px; letter-spacing: 2px; }
.tag-dot { width: 10px; height: 10px; border-radius: 50%; background: #6c5ce7; box-shadow: 0 0 12px rgba(108,92,231,0.6); animation: pulse 2s ease-in-out infinite; }
@keyframes pulse { 0%,100% { opacity:1; } 50% { opacity:0.4; } }
/* 主标题 */
.title { position: relative; z-index: 2; text-align: center; max-width: 880px; }
.title-main { font-size: 72px; font-weight: 800; line-height: 1.2; color: #e8e8f0; letter-spacing: 2px; margin-bottom: 24px; }
.title-main .highlight { background: linear-gradient(135deg, #7c6cf0, #a855f7); -webkit-background-clip: text; -webkit-text-fill-color: transparent; background-clip: text; }
.title-sub { font-size: 28px; color: #8888bb; font-weight: 400; letter-spacing: 4px; }
/* 分隔线 */
.divider { width: 120px; height: 2px; margin: 40px 0; background: linear-gradient(90deg, transparent, #6c5ce7, transparent); position: relative; z-index: 2; }
/* 底部水印 */
.brand { position: absolute; bottom: 50px; right: 80px; z-index: 2; color: rgba(108,92,231,0.4); font-size: 24px; font-weight: 600; letter-spacing: 3px; }
/* 装饰粒子 */
.particle { position: absolute; width: 6px; height: 6px; background: #6c5ce7; border-radius: 50%; opacity: 0.3; }
.p1 { top: 15%; right: 15%; }
.p2 { bottom: 25%; left: 10%; width: 4px; height: 4px; }
.p3 { top: 40%; right: 8%; width: 8px; height: 8px; opacity: 0.15; }
.p4 { bottom: 35%; right: 25%; }
</style>
</head>
<body>
<div class="card">
  <div class="grid"></div>
  <div class="particle p1"></div><div class="particle p2"></div><div class="particle p3"></div><div class="particle p4"></div>
  <div class="tag"><span class="tag-dot"></span> SUPER INDIVIDUAL</div>
  <div class="title">
    <div class="title-main"><span class="highlight">从0接到第一单</span></div>
    <div class="title-sub">3步实操附话术模板</div>
  </div>
  <div class="divider"></div>
  <div class="brand">✦ 超级个体</div>
</div>
</body>
</html>
